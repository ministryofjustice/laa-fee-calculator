name: CI/CD Pipeline

on:
  push:
  workflow_dispatch:

env:
  IMAGE_NAME: app

jobs:
# ----------------------------
# LINT + TESTS
# ----------------------------
  lint:
    runs-on: ubuntu-latest
    if: github.ref_name != 'main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: fee-calculator-${{ hashFiles('Pipfile.lock') }}

      - run: pip install pipenv
      - run: pipenv install --dev
      - run: pipenv run flake8

  test-calculator:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: fee-calculator-${{ hashFiles('Pipfile.lock') }}

      - run: pip install pipenv
      - run: pipenv install --dev

      # - name: Run calculator tests (sharded)
      #   run: |
      #     mkdir -p tmp/coverage
      #     pipenv run coverage run --parallel-mode manage.py test fee_calculator.apps.calculator

      - name: Run calculator tests (sharded)
        run: |
          mkdir -p tmp/coverage
          SHARD=${{ matrix.shard }}
          
          # Get all test module names, split alphabetically
          if [ "$SHARD" = "1" ]; then
            TESTS="fee_calculator.apps.calculator.tests.test_advocate_type_api fee_calculator.apps.calculator.tests.test_fee_type_api fee_calculator.apps.calculator.tests.test_filters"
          elif [ "$SHARD" = "2" ]; then
            TESTS="fee_calculator.apps.calculator.tests.test_modifier_type_api fee_calculator.apps.calculator.tests.test_offence_class_api fee_calculator.apps.calculator.tests.test_price_api"
          else
            TESTS="fee_calculator.apps.calculator.tests.test_scenario_api fee_calculator.apps.calculator.tests.test_scheme_api fee_calculator.apps.calculator.tests.test_unit_api fee_calculator.apps.calculator.tests.test_utils"
          fi
          
          pipenv run coverage run --data-file=tmp/coverage/.coverage --parallel-mode manage.py test $TESTS
          mv .coverage* tmp/coverage/ || true
          
      # - name: Run calculator tests (sharded)
      #   run: |
      #     mkdir -p tmp/coverage
      #     pipenv run coverage run --parallel-mode manage.py test fee_calculator.apps.calculator

      #     # Move coverage data into artifact directory
      #     mv .coverage* tmp/coverage/ || true


      - name: Check coverage files
        run: ls -la tmp/coverage/ || echo "No coverage files found"

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.shard }}
          path: tmp/coverage
          include-hidden-files: true

  test-viewer-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: fee-calculator-${{ hashFiles('Pipfile.lock') }}

      - run: pip install pipenv
      - run: pipenv install --dev

      - name: Run viewer/api tests
        run: |
          mkdir -p tmp/coverage
          pipenv run coverage run --data-file=tmp/coverage/.coverage --parallel-mode manage.py test fee_calculator.apps.viewer fee_calculator.apps.api
          mv .coverage* tmp/coverage/ || true

      - name: Check coverage files
        run: ls -la tmp/coverage/ || echo "No coverage files found"
        
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-viewer
          path: tmp/coverage/
          include-hidden-files: true
      
 

# ----------------------------
# COMBINE COVERAGE
# ----------------------------
  combine-coverage:
    runs-on: ubuntu-latest
    needs: [test-calculator, test-viewer-api]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: tmp
      
      - name: List downloaded artifacts
        run: find tmp -type f | head -20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: pip install pipenv
      - run: pipenv install --dev

      - name: Combine coverage
        run: |
          mkdir -p .coverage-combined
          find tmp -name ".coverage*" -exec cp {} .coverage-combined/ \;
          pipenv run coverage combine .coverage-combined
          pipenv run coverage report

